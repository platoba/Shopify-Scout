version: "3.8"

services:
  bot:
    build: .
    container_name: shopify-scout-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - scout-data:/app/data
      - scout-reports:/app/reports
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: shopify-scout-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  test:
    build: .
    container_name: shopify-scout-test
    command: pytest tests/ -v --tb=short
    profiles:
      - test

volumes:
  scout-data:
  scout-reports:
  redis-data:
